<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- White background square -->
  <rect width="100" height="100" rx="16" ry="16" fill="#ffffff"/>

  <!-- Fish icon centered vertically in the square (original viewBox 100x80, offset 10px top) -->
  <g transform="translate(50, 50) scale(-1, 1)">

    <!-- Fish Body (filled triangle) -->
    <polygon
      points="-35,0 0,-22 0,22"
      fill="#1a1a1a"
      stroke="#1a1a1a"
      stroke-width="2"
      stroke-linejoin="round"
    />

    <!-- Fish Tail (outline triangle) -->
    <polygon
      points="0,0 32,-20 32,20"
      fill="none"
      stroke="#1a1a1a"
      stroke-width="2"
      stroke-linejoin="round"
    />

    <!-- Network Nodes -->
    <circle cx="-35" cy="0" r="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="0" cy="-22" r="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="0" cy="22" r="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="32" cy="-20" r="3" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="32" cy="20" r="3" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>

    <!-- Eye -->
    <circle cx="-14" cy="-4" r="3" fill="#1a1a1a"/>

  </g>
</svg>
